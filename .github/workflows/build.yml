name: Build PSP EBOOT

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pspdev/pspdev:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        working-directory: Minecraft-PlayStationPortable-Edition-master
        run: make -j"$(nproc)"

      - name: Assemble distributable package
        working-directory: Minecraft-PlayStationPortable-Edition-master
        run: |
          mkdir -p dist/MinecraftPSP
          cp EBOOT.PBP dist/MinecraftPSP/
          if [ -d res ]; then
            cp -R res dist/MinecraftPSP/
          fi

      - name: Upload PSP package artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftPSP-package
          path: |
            Minecraft-PlayStationPortable-Edition-master/dist/MinecraftPSP
